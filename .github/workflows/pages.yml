name: Pages

on:
  push:
    branches:
      - main # default branch

jobs: 
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu' # See 'Supported distributions' for available options
          java-version: '25'
      - run: java --version
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Run
      run: start.sh
      
